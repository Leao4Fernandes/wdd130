<!DOCTYPE html>
<html lang="en">

<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

<body>

        <img src="./images/basic-logo.png" alt="pc with code on a blue background" width="128"

    <main>
        <h1>Basic HTML Structure</h1>
        <section>
            <h2>heading</h2>
            <p>Lorem, ipsum.</p>
        </section>
        <section>
            <h2>Heading</h2>

    <aside><img
          src="https://content.churchofjesuschrist.org/templesldsorg/bc/Temples/photo-galleries/accra-ghana/800x500/accra-ghana-temple-758797-wallpaper.jpg"

        <p>Leao Fernandes</p>
